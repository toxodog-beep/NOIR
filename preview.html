<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NOIR FRAME Mobile Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050506;
        --panel: #101113;
        --line: rgba(216, 216, 208, 0.16);
        --text: #f4f1ea;
        --muted: #a8a4a0;
        --silver: #d8d8d0;
        --lens: #12201d;
        --wine: #7a1f2b;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); }
      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }
      .topbar { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between; min-height: 58px; padding: 10px 16px; border-bottom: 1px solid var(--line); background: rgba(5, 5, 6, 0.96); }
      .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 900; }
      .brand-mark { width: 18px; height: 18px; border: 1px solid var(--silver); background: linear-gradient(135deg, var(--silver), #55585b 48%, var(--wine)); transform: rotate(45deg); }
      .shell { width: min(100%, 960px); margin: 0 auto; padding: 14px 14px 96px; }
      .hero, .card, .summary, .detail-media, .cart-item { overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
      .hero { min-height: 410px; display: grid; align-content: end; padding: 18px; }
      .hero-art { width: min(100%, 410px); margin: -18px auto 8px; }
      .eyebrow { margin: 0 0 8px; color: #9db9ad; font-size: 0.72rem; font-weight: 900; text-transform: uppercase; }
      h1, h2, h3, p { margin-top: 0; }
      h1 { max-width: 11ch; margin-bottom: 10px; font-size: clamp(2.3rem, 13vw, 4.8rem); line-height: 0.92; }
      h2 { font-size: 1.24rem; }
      h3 { margin-bottom: 7px; }
      .muted { color: var(--muted); line-height: 1.55; }
      .button { display: inline-flex; align-items: center; justify-content: center; min-height: 46px; padding: 0 15px; border: 1px solid rgba(216, 216, 208, 0.2); border-radius: 8px; background: var(--text); color: #070707; font-weight: 900; cursor: pointer; }
      .button.secondary { background: rgba(216, 216, 208, 0.06); color: var(--text); }
      .row { display: flex; gap: 10px; }
      .tabs { display: flex; gap: 8px; margin: 14px -14px 0; padding: 0 14px 6px; overflow-x: auto; }
      .tab { flex: 0 0 auto; min-height: 38px; padding: 0 13px; border: 1px solid var(--line); border-radius: 8px; background: rgba(216, 216, 208, 0.04); color: var(--muted); }
      .tab.active { border-color: var(--silver); color: var(--text); }
      .section { margin-top: 28px; }
      .section-head, .summary-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .grid, .summary, form { display: grid; gap: 12px; }
      .card { display: grid; grid-template-columns: 42% 1fr; min-height: 178px; }
      .visual { width: 100%; height: 100%; min-height: 178px; display: block; background: #090a0b; }
      .info, .summary { padding: 14px; }
      .info { display: flex; min-width: 0; flex-direction: column; justify-content: space-between; padding: 13px; }
      .badge { display: inline-flex; width: fit-content; min-height: 24px; align-items: center; padding: 0 8px; border: 1px solid rgba(157, 185, 173, 0.32); border-radius: 999px; color: #9db9ad; font-size: 0.68rem; font-weight: 900; }
      .price { margin: 0; color: var(--silver); font-weight: 900; }
      .detail-media { aspect-ratio: 1 / 1.08; }
      .detail-media .visual { min-height: 100%; }
      .specs { display: grid; gap: 8px; margin-top: 16px; }
      .specs div { display: flex; min-height: 44px; align-items: center; justify-content: space-between; padding: 0 12px; border: 1px solid var(--line); border-radius: 8px; }
      .cart-item { display: grid; grid-template-columns: 98px 1fr; gap: 12px; padding: 12px; }
      .qty { display: grid; grid-template-columns: 42px 42px 42px; align-items: center; width: 126px; overflow: hidden; border: 1px solid var(--line); border-radius: 8px; }
      .qty button { min-height: 42px; border: 0; background: transparent; color: var(--text); }
      .qty span { text-align: center; }
      .sticky { position: fixed; right: 0; bottom: 62px; left: 0; z-index: 4; display: flex; gap: 10px; padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); background: rgba(5, 5, 6, 0.96); }
      .sticky .button { flex: 1; }
      .bottom-nav { position: fixed; right: 0; bottom: 0; left: 0; z-index: 6; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); background: rgba(5, 5, 6, 0.97); }
      .bottom-nav a { display: flex; min-height: 44px; align-items: center; justify-content: center; border-radius: 8px; color: var(--muted); font-size: 0.78rem; font-weight: 800; }
      .bottom-nav a.active { border: 1px solid rgba(216, 216, 208, 0.28); background: rgba(216, 216, 208, 0.08); color: var(--text); }
      input { width: 100%; min-height: 48px; padding: 0 12px; border: 1px solid var(--line); border-radius: 8px; background: rgba(216, 216, 208, 0.06); color: var(--text); }
      label { display: grid; gap: 7px; color: var(--muted); font-size: 0.82rem; }
      @media (min-width: 720px) { .shell { padding-inline: 24px; } .hero { min-height: 560px; } .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .card { grid-template-columns: 1fr; } .card .visual { aspect-ratio: 1 / 1; min-height: 260px; } }
    </style>
  </head>
  <body>
    <header class="topbar"><a class="brand" href="?route=%2F" data-route="/"><span class="brand-mark"></span><span>NOIR FRAME</span></a><a class="muted" href="?route=%2Forders" data-route="/orders">주문조회</a></header>
    <main id="app" class="shell"></main>
    <nav class="bottom-nav"><a href="?route=%2F" data-route="/" data-nav="home">Home</a><a href="?route=%2Fshop" data-route="/shop" data-nav="shop">Shop</a><a href="?route=%2Fcart" data-route="/cart" data-nav="cart">Cart <span id="cart-count">0</span></a><a href="?route=%2Forders" data-route="/orders" data-nav="orders">Order</a></nav>
    <script>
      const products = [
        ["axis-shield-black", "AXIS Shield Black", "trend", "Trend", "sunglasses", 168000, "New", "shield", "낮고 넓은 실드 렌즈로 얼굴선을 강하게 잡아주는 트렌드 선글라스."],
        ["velvet-tint-burgundy", "VELVET Tint Burgundy", "trend", "Trend", "sunglasses", 142000, "Tint", "square", "딥 버건디 틴트 렌즈와 소프트 스퀘어 프레임."],
        ["noir-square-01", "NOIR Square 01", "classic", "Classic", "sunglasses", 128000, "Core", "square", "매일 쓰기 좋은 블랙 스퀘어 프레임."],
        ["tortoise-arc", "TORTOISE Arc", "classic", "Classic", "glasses", 118000, "Frame", "optical", "토터스 패턴과 부드러운 각도의 안경테."],
        ["crossline-cat-eye", "CROSSLINE Cat Eye", "statement", "Statement", "sunglasses", 186000, "Bold", "cat", "날카로운 캣아이 라인의 스테이트먼트 렌즈."],
        ["rimless-ice", "RIMLESS Ice", "metal-rimless", "Metal/Rimless", "glasses", 138000, "Light", "rimless", "얇은 실버 메탈 브릿지의 림리스 안경."],
        ["lowrider-wrap", "LOWRIDER Wrap", "trend", "Trend", "sunglasses", 174000, "Wrap", "wrap", "스포티한 무드의 낮은 랩 선글라스."],
        ["blade-square-smoke", "BLADE Square Smoke", "statement", "Statement", "sunglasses", 198000, "Limited", "blade", "블레이드처럼 직선적인 스모크 렌즈."],
        ["spike-band-ring", "SPIKE Band Ring", "accessories", "Accessories", "ring", 62000, "Silver", "ring", "입체적인 스파이크 텍스처의 실전용 밴드 링."],
        ["veil-pendant-necklace", "VEIL Pendant Necklace", "accessories", "Accessories", "necklace", 79000, "Pendant", "pendant", "작은 메탈 펜던트와 얇은 체인 목걸이."],
        ["chain-loop-necklace", "CHAIN Loop Necklace", "accessories", "Accessories", "necklace", 92000, "Layer", "chain", "묵직한 체인과 작은 루프 장식의 목걸이."],
        ["mirror-signet-ring", "MIRROR Signet Ring", "accessories", "Accessories", "ring", 68000, "Ring", "signet", "거울처럼 반사되는 탑 플레이트의 시그넷 링."],
      ].map(([slug, name, collection, line, category, price, badge, kind, description], index) => ({ id: `nf-${String(index + 1).padStart(3, "0")}`, slug, name, collection, line, category, price, badge, kind, description, stock: 8 + index, material: category === "sunglasses" ? "Acetate, CR39 lens" : category === "glasses" ? "Titanium blend" : "Stainless steel", fit: category === "ring" ? "US 7-12" : category === "necklace" ? "45-48cm" : "Regular" }));
      const tabs = [["all", "All"], ["trend", "Trend"], ["classic", "Classic"], ["statement", "Statement"], ["metal-rimless", "Metal"], ["accessories", "Accessories"]];
      const app = document.querySelector("#app");
      const state = { collection: "all", cart: readCart() };
      document.addEventListener("click", (event) => { const route = event.target.closest("[data-route]")?.dataset.route; if (!route) return; event.preventDefault(); navigate(route); });
      window.addEventListener("popstate", render); render();
      function render() { syncCart(); setNav(); const route = getRoute(); if (route.startsWith("/product/")) return renderProduct(route.split("/").pop()); if (route === "/shop") return renderShop(); if (route === "/cart") return renderCart(); if (route === "/checkout") return renderCheckout(); if (route === "/orders") return renderOrders(); return renderHome(); }
      function renderHome() { app.innerHTML = `<section class="hero"><div class="hero-art">${visual("shield")}</div><p class="eyebrow">Mobile First Eyewear Store</p><h1>FRAME THE NIGHT</h1><p class="muted">선글라스, 안경테, 실버 링과 목걸이를 모바일에서 빠르게 탐색하는 NOIR FRAME 프리뷰.</p><div class="row"><a class="button" href="?route=%2Fshop" data-route="/shop">Shop now</a><a class="button secondary" href="?route=%2Fproduct%2Faxis-shield-black" data-route="/product/axis-shield-black">대표 상품</a></div></section>${renderTabs()}<section class="section"><div class="section-head"><div><p class="eyebrow">New Arrivals</p><h2>모바일에서 먼저 보는 컬렉션</h2></div><a class="muted" href="?route=%2Fshop" data-route="/shop">전체보기</a></div><div class="grid">${products.slice(0, 6).map(card).join("")}</div></section>`; bindTabs(); }
      function renderShop() { const shown = state.collection === "all" ? products : products.filter((item) => item.collection === state.collection); app.innerHTML = `<section class="section" style="margin-top:6px"><p class="eyebrow">Shop</p><h1 style="font-size:2.2rem;max-width:none">Trend / Classic</h1><p class="muted">요즘 실루엣부터 클래식 블랙 프레임, 실버 악세사리까지.</p>${renderTabs()}</section><section class="section"><div class="grid">${shown.map(card).join("")}</div></section>`; bindTabs(); }
      function renderProduct(slug) { const product = products.find((item) => item.slug === slug); if (!product) return (app.innerHTML = empty("상품을 찾을 수 없습니다.")); app.innerHTML = `<section><div class="detail-media">${visual(product.kind)}</div><div class="section"><span class="badge">${product.badge}</span><h1 style="font-size:2.4rem;max-width:none;margin-top:12px">${product.name}</h1><p class="muted">${product.description}</p><p class="price" style="font-size:1.25rem">${won(product.price)}</p><div class="specs"><div><span>라인</span><strong>${product.line}</strong></div><div><span>소재</span><strong>${product.material}</strong></div><div><span>핏</span><strong>${product.fit}</strong></div><div><span>재고</span><strong>${product.stock}개</strong></div></div></div></section><div class="sticky"><button class="button secondary" data-add="${product.id}">장바구니</button><button class="button" data-buy="${product.id}">바로 구매</button></div>`; document.querySelector("[data-add]").onclick = () => add(product.id); document.querySelector("[data-buy]").onclick = () => { add(product.id); navigate("/checkout"); }; }
      function renderCart() { const items = cartLines(); if (!items.length) { app.innerHTML = `${empty("장바구니가 비어 있습니다.")}<a class="button" href="?route=%2Fshop" data-route="/shop">상품 보러가기</a>`; return; } app.innerHTML = `<section class="section" style="margin-top:6px"><p class="eyebrow">Cart</p><h1 style="font-size:2.2rem;max-width:none">장바구니</h1></section><section class="grid">${items.map(cartItem).join("")}</section><section class="section summary">${summary(items)}<a class="button" href="?route=%2Fcheckout" data-route="/checkout">주문서 작성</a></section>`; document.querySelectorAll("[data-qty]").forEach((button) => { button.onclick = () => changeQty(button.dataset.id, Number(button.dataset.qty)); }); }
      function renderCheckout() { const items = cartLines(); if (!items.length) return (app.innerHTML = empty("결제할 상품이 없습니다.")); app.innerHTML = `<section class="section" style="margin-top:6px"><p class="eyebrow">Checkout</p><h1 style="font-size:2.2rem;max-width:none">주문서</h1></section><form id="checkout"><label>이름<input name="name" required /></label><label>연락처<input name="phone" required inputmode="tel" placeholder="01012345678" /></label><label>주소<input name="address" required /></label><div class="summary">${summary(items)}</div><p class="muted">프리뷰 링크에서는 실제 결제 대신 주문 완료 데모로 이동합니다.</p><button class="button" type="submit">주문 완료 데모</button></form>`; document.querySelector("#checkout").onsubmit = (event) => { event.preventDefault(); const id = `NF-${Date.now().toString(36).toUpperCase()}`; localStorage.setItem("nf_last_order", id); state.cart = []; writeCart(); app.innerHTML = `<section class="summary" style="margin-top:18vh"><p class="eyebrow">Confirmed</p><h1 style="font-size:2.2rem;max-width:none">주문이 완료되었습니다</h1><p class="muted">주문번호 ${id}</p><a class="button" href="?route=%2Fshop" data-route="/shop">계속 쇼핑하기</a></section>`; syncCart(); }; }
      function renderOrders() { const last = localStorage.getItem("nf_last_order"); app.innerHTML = `<section class="summary" style="margin-top:20px"><p class="eyebrow">Order</p><h1 style="font-size:2.2rem;max-width:none">주문 조회</h1><p class="muted">${last ? `최근 주문번호 ${last}` : "아직 프리뷰 주문이 없습니다."}</p></section>`; }
      function renderTabs() { return `<div class="tabs">${tabs.map(([id, label]) => `<button class="tab ${state.collection === id ? "active" : ""}" data-tab="${id}">${label}</button>`).join("")}</div>`; }
      function bindTabs() { document.querySelectorAll("[data-tab]").forEach((button) => { button.onclick = () => { state.collection = button.dataset.tab; navigate("/shop"); }; }); }
      function card(product) { return `<a class="card" href="?route=%2Fproduct%2F${product.slug}" data-route="/product/${product.slug}">${visual(product.kind)}<div class="info"><div><span class="badge">${product.badge}</span><h3>${product.name}</h3><p class="muted">${product.line} / ${product.category}</p></div><div><p class="price">${won(product.price)}</p><p class="muted">재고 ${product.stock}개</p></div></div></a>`; }
      function cartItem(item) { return `<article class="cart-item">${visual(item.kind)}<div><h3>${item.name}</h3><p class="muted">${won(item.price)}</p><div class="qty"><button data-id="${item.id}" data-qty="-1">-</button><span>${item.qty}</span><button data-id="${item.id}" data-qty="1">+</button></div></div></article>`; }
      function visual(kind) { const eyewear = { square: '<rect x="124" y="196" width="178" height="132" rx="42" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/><rect x="398" y="196" width="178" height="132" rx="42" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/>', cat: '<rect x="120" y="196" width="184" height="130" rx="50" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/><rect x="396" y="196" width="184" height="130" rx="50" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/>', rimless: '<rect x="126" y="196" width="176" height="132" rx="46" fill="#14211f" stroke="#d8d8d0" stroke-width="6"/><rect x="398" y="196" width="176" height="132" rx="46" fill="#14211f" stroke="#d8d8d0" stroke-width="6"/>', wrap: '<rect x="88" y="198" width="524" height="132" rx="66" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/>', blade: '<rect x="118" y="198" width="184" height="128" rx="34" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/><rect x="398" y="198" width="184" height="128" rx="34" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/>', shield: '<rect x="92" y="198" width="516" height="134" rx="67" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/>', optical: '<rect x="124" y="196" width="178" height="132" rx="48" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/><rect x="398" y="196" width="178" height="132" rx="48" fill="#14211f" stroke="#d8d8d0" stroke-width="14"/>' }; const jewelry = { ring: '<circle cx="350" cy="312" r="146" fill="none" stroke="#d8d8d0" stroke-width="42"/><circle cx="350" cy="312" r="86" fill="none" stroke="#ffffff" stroke-opacity=".2" stroke-width="10"/><circle cx="350" cy="198" r="20" fill="#ffffff" opacity=".17"/>', signet: '<circle cx="350" cy="318" r="146" fill="none" stroke="#d8d8d0" stroke-width="42"/><circle cx="350" cy="318" r="86" fill="none" stroke="#ffffff" stroke-opacity=".2" stroke-width="10"/><rect x="268" y="190" width="164" height="88" rx="28" fill="#c9c9c0" opacity=".88"/>', pendant: '<path d="M190 174c86-54 234-54 320 0" fill="none" stroke="#d8d8d0" stroke-width="14"/><path d="M350 182v126" stroke="#d8d8d0" stroke-width="8"/><path d="M350 308l-56 126h112z" fill="#c9c9c0" opacity=".78"/>', chain: '<rect x="132" y="228" width="110" height="56" rx="28" fill="none" stroke="#d8d8d0" stroke-width="14"/><rect x="224" y="260" width="110" height="56" rx="28" fill="none" stroke="#d8d8d0" stroke-width="14"/><rect x="316" y="228" width="110" height="56" rx="28" fill="none" stroke="#d8d8d0" stroke-width="14"/><rect x="408" y="260" width="110" height="56" rx="28" fill="none" stroke="#d8d8d0" stroke-width="14"/><circle cx="350" cy="392" r="64" fill="none" stroke="#d8d8d0" stroke-width="18"/>' }; const isJewelry = ["ring", "signet", "pendant", "chain"].includes(kind); const body = isJewelry ? jewelry[kind] : eyewear[kind] || eyewear.shield; const bridge = isJewelry ? "" : kind === "wrap" || kind === "shield" ? '<path d="M148 264h404" stroke="#d8d8d0" stroke-width="7" opacity=".55"/>' : '<path d="M302 264h96" stroke="#d8d8d0" stroke-width="10"/>'; const temples = isJewelry ? "" : '<path d="M126 272 58 322M574 272l68 50" stroke="#060607" stroke-width="15" stroke-linecap="round"/>'; const shine = isJewelry ? "" : '<path d="M176 214c44-14 92-14 136 0M388 214c44-14 92-14 136 0" stroke="#ffffff" stroke-opacity=".24" stroke-width="7" stroke-linecap="round"/>'; return `<svg class="visual" viewBox="0 0 700 560" role="img" aria-label="NOIR FRAME product render"><rect width="700" height="560" fill="#090a0b"/><g transform="translate(0 18)" stroke-linecap="round" stroke-linejoin="round">${body}${bridge}</g>${temples}${shine}</svg>`; }
      function summary(items) { const subtotal = items.reduce((sum, item) => sum + item.price * item.qty, 0); const shipping = subtotal >= 100000 ? 0 : 3000; return `<div class="summary-row"><span>상품금액</span><strong>${won(subtotal)}</strong></div><div class="summary-row"><span>배송비</span><strong>${won(shipping)}</strong></div><div class="summary-row"><span>총 결제금액</span><strong>${won(subtotal + shipping)}</strong></div>`; }
      function cartLines() { return state.cart.map((line) => ({ ...products.find((item) => item.id === line.id), qty: line.qty })).filter((item) => item.id); }
      function add(id) { const item = state.cart.find((line) => line.id === id); if (item) item.qty += 1; else state.cart.push({ id, qty: 1 }); writeCart(); syncCart(); }
      function changeQty(id, delta) { const item = state.cart.find((line) => line.id === id); if (!item) return; item.qty += delta; if (item.qty <= 0) state.cart = state.cart.filter((line) => line.id !== id); writeCart(); renderCart(); }
      function getRoute() { return new URLSearchParams(location.search).get("route") || "/"; }
      function navigate(route) { history.pushState({}, "", `?route=${encodeURIComponent(route)}`); render(); }
      function setNav() { const route = getRoute(); document.querySelectorAll("[data-nav]").forEach((link) => link.classList.remove("active")); const key = route === "/" ? "home" : route.startsWith("/product") || route === "/shop" ? "shop" : route.slice(1); document.querySelector(`[data-nav="${key}"]`)?.classList.add("active"); }
      function syncCart() { const count = state.cart.reduce((sum, item) => sum + item.qty, 0); document.querySelector("#cart-count").textContent = String(count); }
      function readCart() { try { return JSON.parse(localStorage.getItem("nf_preview_cart") || "[]"); } catch { return []; } }
      function writeCart() { localStorage.setItem("nf_preview_cart", JSON.stringify(state.cart)); }
      function won(value) { return new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(value); }
      function empty(message) { return `<section class="summary" style="margin-top:18vh;text-align:center"><p class="muted">${message}</p></section>`; }
    </script>
  </body>
</html>
